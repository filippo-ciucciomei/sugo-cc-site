    <!-- NAVBAR SCRIPT -->
    <script>
        const navLeft = document.querySelector('.nav-left');
        const navToggle = document.getElementById('navToggle');

        navToggle.addEventListener('click', function (e) {
            e.stopPropagation();
            navLeft.classList.toggle('open');

            const expanded = navLeft.classList.contains('open');
            navToggle.setAttribute('aria-expanded', expanded);
        });

        document.addEventListener('click', function (e) {
            if (!navLeft.contains(e.target)) {
                navLeft.classList.remove('open');
                navToggle.setAttribute('aria-expanded', 'false');
            }
        });
    </script>

    <!-- Yonas Illustration -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const rider = document.getElementById('floating-rider');
            if (!rider) return;

            let x = 40;
            let y = 140;
            let vx = 1.2;
            let vy = 0.65;
            let facingRight = true;
            let animationId = null;

            function updateRiderSizeIfNeeded() {
                if (window.innerWidth < 768) {
                    rider.style.width = '120px';
                } else {
                    rider.style.width = '120px';
                }
            }

            function animate() {
                const vw = window.innerWidth;
                const vh = window.innerHeight;
                const rect = rider.getBoundingClientRect();
                const riderWidth = rect.width;
                const riderHeight = rect.height;

                x += vx;
                y += vy;

                /* left / right bounce + flip */
                if (x <= 0) {
                    x = 0;
                    vx = Math.abs(vx);
                    facingRight = true;
                }

                if (x + riderWidth >= vw) {
                    x = vw - riderWidth;
                    vx = -Math.abs(vx);
                    facingRight = false;
                }

                /* top / bottom bounce only, no flip */
                if (y <= 0) {
                    y = 0;
                    vy = Math.abs(vy);
                }

                if (y + riderHeight >= vh) {
                    y = vh - riderHeight;
                    vy = -Math.abs(vy);
                }

                const angle = Math.atan2(vy, Math.abs(vx)) * 180 / Math.PI * 0.35;

                rider.style.left = `${x}px`;
                rider.style.top = `${y}px`;
                rider.style.transform = facingRight
                    ? `rotate(${angle}deg) scaleX(1)`
                    : `rotate(${-angle}deg) scaleX(-1)`;

                animationId = requestAnimationFrame(animate);
            }

            function resetInsideViewport() {
                const rect = rider.getBoundingClientRect();
                x = Math.min(Math.max(0, x), window.innerWidth - rect.width);
                y = Math.min(Math.max(0, y), window.innerHeight - rect.height);
            }

            updateRiderSizeIfNeeded();

            window.addEventListener('resize', () => {
                updateRiderSizeIfNeeded();
                resetInsideViewport();
            });

            animationId = requestAnimationFrame(animate);
        });
    </script>
