    <!-- NAVBAR SCRIPT -->
    <script>
        const navLeft = document.querySelector('.nav-left');
        const navToggle = document.getElementById('navToggle');

        navToggle.addEventListener('click', function (e) {
            e.stopPropagation();
            navLeft.classList.toggle('open');

            const expanded = navLeft.classList.contains('open');
            navToggle.setAttribute('aria-expanded', expanded);
        });

        document.addEventListener('click', function (e) {
            if (!navLeft.contains(e.target)) {
                navLeft.classList.remove('open');
                navToggle.setAttribute('aria-expanded', 'false');
            }
        });
    </script>

    <!-- CARDS MOTION JS -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const cards = Array.from(document.querySelectorAll('.floating-card'));
            const playBtn = document.getElementById('playCards');
            const stopBtn = document.getElementById('stopCards');
            const body = document.body;

            let animationId = null;
            let isMoving = false;
            const state = new Map();

            function clearCardInlineStyles(card) {
                card.style.position = '';
                card.style.left = '';
                card.style.top = '';
                card.style.margin = '';
                card.style.zIndex = '';
                card.style.transform = '';
            }

            function resetToGrid() {
                cancelAnimationFrame(animationId);
                animationId = null;
                isMoving = false;
                body.classList.remove('cards-are-moving');

                cards.forEach(card => {
                    clearCardInlineStyles(card);
                });
            }

            function captureGridPositions() {
                return cards.map(card => {
                    const rect = card.getBoundingClientRect();
                    return {
                        card,
                        left: rect.left,
                        top: rect.top,
                        width: rect.width,
                        height: rect.height
                    };
                });
            }

            function randomVelocity() {
                const min = 0.4;
                const max = 0.9;
                const value = Math.random() * (max - min) + min;
                return Math.random() > 0.5 ? value : -value;
            }

            function activateFloatingMode() {
                const positions = captureGridPositions();
                body.classList.add('cards-are-moving');

                positions.forEach(({ card, left, top, width, height }, index) => {
                    card.style.position = 'fixed';
                    card.style.left = `${left}px`;
                    card.style.top = `${top}px`;
                    card.style.margin = '0';
                    card.style.zIndex = 20 + index;

                    state.set(card, {
                        x: left,
                        y: top,
                        vx: randomVelocity(),
                        vy: randomVelocity(),
                        width,
                        height
                    });
                });
            }

            function animateCards() {
                const vw = window.innerWidth;
                const vh = window.innerHeight;

                cards.forEach(card => {
                    const s = state.get(card);
                    if (!s) return;

                    s.x += s.vx;
                    s.y += s.vy;

                    if (s.x <= 0) {
                        s.x = 0;
                        s.vx *= -1;
                    }

                    if (s.x + s.width >= vw) {
                        s.x = vw - s.width;
                        s.vx *= -1;
                    }

                    if (s.y <= 0) {
                        s.y = 0;
                        s.vy *= -1;
                    }

                    if (s.y + s.height >= vh) {
                        s.y = vh - s.height;
                        s.vy *= -1;
                    }

                    card.style.left = `${s.x}px`;
                    card.style.top = `${s.y}px`;
                });

                animationId = requestAnimationFrame(animateCards);
            }

            function startMoving() {
                if (isMoving) return;

                resetToGrid();

                requestAnimationFrame(() => {
                    activateFloatingMode();
                    isMoving = true;
                    animationId = requestAnimationFrame(animateCards);
                });
            }

            function stopMoving() {
                resetToGrid();
            }

            playBtn.addEventListener('click', startMoving);
            stopBtn.addEventListener('click', stopMoving);

            window.addEventListener('resize', () => {
                if (isMoving) {
                    startMoving();
                }
            });

            startMoving();
        });
    </script>
